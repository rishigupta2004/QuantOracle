services:
  - type: web
    name: quantoracle
    env: docker
    autoDeploy: true
    plan: starter
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
  - type: web
    name: quantoracle-api
    env: python
    autoDeploy: true
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: QUANTORACLE_BILLING_TOKEN
        sync: false
      - key: QUANTORACLE_WORKSPACE_PLAN
        value: starter
      - key: QUANTORACLE_BILLING_STORE_PATH
        value: data/billing/workspaces.json
