name: Intraday Quotes

on:
  workflow_dispatch:
  schedule:
    # Every 15 minutes during NSE hours (IST 09:15-15:30 => UTC 03:45-10:00), weekdays.
    - cron: "45-59/15 3 * * 1-5"  # 03:45
    - cron: "*/15 4-9 * * 1-5"    # 04:00..09:45
    - cron: "0 10 * * 1-5"        # 10:00 (15:30 IST close)
    # One extra run at 10:15 UTC (~15:45 IST) to guarantee a post-close publish.
    - cron: "15 10 * * 1-5"

concurrency:
  group: intraday-quotes
  cancel-in-progress: true

jobs:
  quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do
            pip install -r requirements.txt && break
            echo "pip install failed (attempt $i), retrying in 5s..."
            sleep 5
          done

      - name: Preflight secrets
        id: preflight
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_BUCKET" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing required Supabase secrets; skipping publish step."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish intraday quotes snapshot
        if: steps.preflight.outputs.ready == 'true'
        env:
          QUANTORACLE_DATA_DIR: data
          QUANTORACLE_EOD_PREFIX: eod/nifty50
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          UPSTOX_SYMBOL_MAP: ${{ secrets.UPSTOX_SYMBOL_MAP }}
          GROWW_API_KEY: ${{ secrets.GROWW_API_KEY }}
          GROWW_API_SECRET: ${{ secrets.GROWW_API_SECRET }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            if python scripts/publish_quotes.py --universe-file data/universe/india_core.txt --prefix eod/nifty50 --provider auto --upload; then
              echo "Intraday quotes succeeded"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "All attempts failed"
          exit 1
