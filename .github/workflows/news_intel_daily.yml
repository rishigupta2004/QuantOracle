name: News Intel Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

concurrency:
  group: news-intel-daily
  cancel-in-progress: true

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build + publish daily news intel
        env:
          QUANTORACLE_DATA_DIR: data
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QUANTORACLE_NEWS_PREFIX: news/intel
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          python scripts/publish_news_intel.py --max-items 60 --upload
