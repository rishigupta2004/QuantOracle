name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do
            pip install -r requirements.txt && pip install pytest pytest-cov && break
            echo "pip install failed (attempt $i), retrying in 5s..."
            sleep 5
          done

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: |
          for i in 1 2 3; do
            pip install ruff && break
            echo "ruff install failed (attempt $i), retrying in 5s..."
            sleep 5
          done

      - name: Run ruff
        run: ruff check .

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: |
          for i in 1 2 3; do
            npm ci && break
            echo "npm ci failed (attempt $i), retrying in 5s..."
            sleep 5
          done
        working-directory: web

      - name: Lint web app
        run: npm run lint
        working-directory: web

      - name: Typecheck web app
        run: npm run typecheck
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web
