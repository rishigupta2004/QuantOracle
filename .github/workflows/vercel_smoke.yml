name: Vercel Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed web base URL"
        required: false
        default: ""
  schedule:
    - cron: "30 4 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve base URL
        id: cfg
        env:
          INPUT_BASE_URL: ${{ github.event.inputs.base_url }}
          VAR_BASE_URL: ${{ vars.QUANTORACLE_WEB_BASE_URL }}
        run: |
          BASE_URL="$INPUT_BASE_URL"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="$VAR_BASE_URL"
          fi
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://quant-oracle.vercel.app"
          fi
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
          echo "Using BASE_URL=$BASE_URL"

      - name: Run smoke checks
        run: |
          python scripts/smoke_vercel_web.py --base-url "${{ steps.cfg.outputs.base_url }}" --strict > smoke_report.json

      - name: Validate schema checks
        run: |
          python - <<'PY'
          import json
          import sys

          report = json.load(open("smoke_report.json", "r", encoding="utf-8"))
          summary = report.get("summary", {})
          print("Summary:", summary)

          if not summary.get("all_shape_checks_ok"):
              print("Schema check failed")
              sys.exit(1)
          if not summary.get("upstox_callback_route_ok"):
              print("Upstox callback route check failed")
              sys.exit(1)
          if not summary.get("status_endpoint_ok"):
              print("Status endpoint check failed")
              sys.exit(1)

          missing_required = report.get("vercel_keys", {}).get("missing_required", [])
          if missing_required:
              print("Missing required keys for full live readiness:", ", ".join(missing_required))
          PY

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        with:
          name: vercel-smoke-report
          path: smoke_report.json
